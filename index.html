<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alat Peraga Interaktif - Kemagnetan</title>
    <!-- Tailwind CSS dari CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Import Map untuk Resolusi ES Modules React (Memperbaiki error jsx-runtime) -->
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.2.0",
            "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
            "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime"
        }
    }
    </script>

    <!-- Babel untuk kompilasi JSX di browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 20px; /* Memberi sedikit ruang aman */
            box-sizing: border-box;
            overflow: auto; /* Memunculkan scroll jika layar sangat kecil */
            background-color: #1e293b; /* slate-800 */
            /* Menggunakan Grid alih-alih Flex untuk mencegah pemotongan paksa layar */
            display: grid;
            place-items: center;
            min-height: 100vh;
        }

        /* Custom Scrollbar untuk area konten kiri */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9; 
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Menggunakan data-type="module" agar Babel output format ES Module -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';

        // Komponen Ikon (SVG Inline karena Lucide-react tidak bisa langsung via UMD CDN dengan mudah)
        const IconTarget = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
        const IconBook = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
        const IconList = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="10" x2="21" y1="6" y2="6"/><line x1="10" x2="21" y1="12" y2="12"/><line x1="10" x2="21" y1="18" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></svg>;
        const IconPlay = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>;
        const IconCheckSquare = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>;
        const IconCheckCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-green-600 ml-auto"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const IconXCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-red-600 ml-auto"><circle cx="12" cy="12" r="10"/><line x1="15" x2="9" y1="9" y2="15"/><line x1="9" x2="15" y1="9" y2="15"/></svg>;
        const IconTrophy = () => <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-yellow-500"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>;

        function App() {
            const [activeTab, setActiveTab] = useState('tujuan');
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [score, setScore] = useState(0);
            const [isFinished, setIsFinished] = useState(false);

            // Data Soal Evaluasi
            const questions = [
                {
                    text: "Sebuah kawat lurus panjang dialiri arus listrik sebesar 2 A. Berapakah besar induksi magnetik pada jarak 10 cm dari kawat tersebut? (μ₀ = 4π × 10⁻⁷ Wb/Am)",
                    options: [
                        { id: 'A', text: "2 × 10⁻⁶ T" },
                        { id: 'B', text: "4 × 10⁻⁶ T" },
                        { id: 'C', text: "2 × 10⁻⁷ T" },
                        { id: 'D', text: "4 × 10⁻⁷ T" },
                        { id: 'E', text: "8 × 10⁻⁶ T" }
                    ],
                    correct: 'B',
                    explanation: "B = (μ₀ · I) / (2π · a) = (4π × 10⁻⁷ · 2) / (2π · 0.1) = 4 × 10⁻⁶ T"
                },
                {
                    text: "Sebuah kawat lurus vertikal dialiri arus listrik dari bawah ke atas. Berdasarkan kaidah tangan kanan, arah medan magnet di sebelah timur kawat akan menunjuk ke arah...",
                    options: [
                        { id: 'A', text: "Utara" },
                        { id: 'B', text: "Selatan" },
                        { id: 'C', text: "Barat" },
                        { id: 'D', text: "Atas" },
                        { id: 'E', text: "Bawah" }
                    ],
                    correct: 'A',
                    explanation: "Kaidah tangan kanan: Ibu jari ke atas (arah arus), maka putaran empat jari di sebelah timur kawat akan mengarah ke Utara."
                },
                {
                    text: "Jika kuat arus yang mengalir pada kawat lurus panjang diperbesar menjadi dua kali lipat, dan jarak titik pengamatan dijauhkan menjadi dua kali lipat, maka besar induksi magnetiknya akan menjadi...",
                    options: [
                        { id: 'A', text: "Seperempat kali semula" },
                        { id: 'B', text: "Setengah kali semula" },
                        { id: 'C', text: "Sama seperti semula" },
                        { id: 'D', text: "Dua kali semula" },
                        { id: 'E', text: "Empat kali semula" }
                    ],
                    correct: 'C',
                    explanation: "B = (μ₀ · I) / (2π · a). Jika I menjadi 2I dan a menjadi 2a, maka B' = (μ₀ · 2I) / (2π · 2a) = (μ₀ · I) / (2π · a) = B (Tetap)."
                },
                {
                    text: "Dua kawat lurus panjang sejajar A dan B berjarak 20 cm satu sama lain. Keduanya dialiri arus listrik 5 A dengan arah yang sama. Besar induksi magnetik di titik tengah antara kedua kawat tersebut adalah...",
                    options: [
                        { id: 'A', text: "0 T" },
                        { id: 'B', text: "1 × 10⁻⁵ T" },
                        { id: 'C', text: "2 × 10⁻⁵ T" },
                        { id: 'D', text: "4 × 10⁻⁵ T" },
                        { id: 'E', text: "5 × 10⁻⁶ T" }
                    ],
                    correct: 'A',
                    explanation: "Di titik tengah (jarak 10 cm dari tiap kawat), kuat medan dari kawat A dan B sama besar namun berlawanan arah (karena arus searah), sehingga saling meniadakan (B total = 0)."
                },
                {
                    text: "Suatu titik sejauh a dari kawat lurus berarus listrik I memiliki induksi magnetik sebesar B. Agar induksi magnetik di titik tersebut berkurang menjadi 1/4 B, maka jarak titik ke kawat harus diubah menjadi...",
                    options: [
                        { id: 'A', text: "1/4 a" },
                        { id: 'B', text: "1/2 a" },
                        { id: 'C', text: "2 a" },
                        { id: 'D', text: "4 a" },
                        { id: 'E', text: "8 a" }
                    ],
                    correct: 'D',
                    explanation: "Besar induksi magnetik berbanding terbalik dengan jarak (B ∝ 1/a). Agar B menjadi 1/4 kali semula, maka jarak a harus diubah menjadi 4 kali semula (4a)."
                }
            ];

            const question = questions[currentQIndex];

            const handleSubmit = () => {
                if (selectedAnswer) {
                    setIsSubmitted(true);
                    if (selectedAnswer === question.correct) {
                        setScore(prev => prev + 1);
                    }
                }
            };

            const handleNext = () => {
                if (currentQIndex < questions.length - 1) {
                    setCurrentQIndex(prev => prev + 1);
                    setSelectedAnswer(null);
                    setIsSubmitted(false);
                } else {
                    setIsFinished(true);
                }
            };

            const handleResetQuiz = () => {
                setCurrentQIndex(0);
                setSelectedAnswer(null);
                setIsSubmitted(false);
                setScore(0);
                setIsFinished(false);
            };

            const menuItems = [
                { id: 'tujuan', label: 'Tujuan', icon: <IconTarget /> },
                { id: 'teori', label: 'Teori', icon: <IconBook /> },
                { id: 'prosedur', label: 'Prosedur', icon: <IconList /> },
                { id: 'simulasi', label: 'Simulasi', icon: <IconPlay /> },
                { id: 'evaluasi', label: 'Evaluasi', icon: <IconCheckSquare /> },
            ];

            return (
                <div 
                    style={{ width: '916px', height: '516px', minWidth: '916px', minHeight: '516px' }} 
                    className="bg-white rounded-xl shadow-2xl overflow-hidden flex flex-col border-4 border-slate-700 font-sans flex-shrink-0"
                >
                    {/* HEADER */}
                    <div className="bg-blue-900 text-white px-5 py-3 flex justify-between items-center shadow-md z-10 shrink-0">
                        <div>
                            <h1 className="text-xl font-bold tracking-wide">KEMAGNETAN <span className="text-blue-300 font-medium text-sm ml-2">Kelas 12 SMA</span></h1>
                            <p className="text-xs text-blue-200 mt-1 font-medium bg-blue-800 inline-block px-2 py-0.5 rounded">Fase F</p>
                        </div>
                        <div className="text-right">
                            <p className="text-sm font-bold text-blue-100">Satya Widura</p>
                            <p className="text-xs text-blue-300">SMAN 10 Denpasar</p>
                        </div>
                    </div>

                    {/* BODY - 2 Kolom */}
                    <div className="flex flex-1 overflow-hidden">
                        
                        {/* KOLOM KIRI: Materi (Ditambahkan shrink-0 agar ukurannya tidak bisa tergencet sama sekali) */}
                        <div className="w-[380px] shrink-0 bg-slate-50 flex flex-col border-r border-slate-200">
                            
                            {/* Tabs Navigasi */}
                            <div className="flex flex-wrap bg-slate-200 border-b border-slate-300 p-1 shrink-0">
                                {menuItems.map((item) => (
                                    <button
                                        key={item.id}
                                        onClick={() => setActiveTab(item.id)}
                                        className={`flex items-center gap-1.5 px-3 py-2 text-xs font-semibold rounded-t-md transition-colors ${
                                            activeTab === item.id 
                                                ? 'bg-white text-blue-700 border-t-2 border-blue-600 shadow-sm' 
                                                : 'text-slate-600 hover:bg-slate-300'
                                        }`}
                                    >
                                        {item.icon}
                                        {item.label}
                                    </button>
                                ))}
                            </div>

                            {/* Area Konten Kiri */}
                            <div className="flex-1 p-5 overflow-y-auto custom-scrollbar">
                                
                                {/* KONTEN: TUJUAN */}
                                {activeTab === 'tujuan' && (
                                    <div className="animate-fade-in text-slate-800 text-sm">
                                        <h2 className="text-base font-bold text-blue-800 mb-3 border-b pb-1">Tujuan Pembelajaran</h2>
                                        <ul className="space-y-3">
                                            <li className="flex items-start gap-2">
                                                <div className="w-5 h-5 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center shrink-0 mt-0.5 text-xs font-bold">1</div>
                                                <p>Peserta didik mampu menganalisis fenomena timbulnya medan magnet di sekitar kawat berarus listrik (Hukum Oersted).</p>
                                            </li>
                                            <li className="flex items-start gap-2">
                                                <div className="w-5 h-5 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center shrink-0 mt-0.5 text-xs font-bold">2</div>
                                                <p>Menentukan arah medan magnet menggunakan Kaidah Tangan Kanan.</p>
                                            </li>
                                            <li className="flex items-start gap-2">
                                                <div className="w-5 h-5 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center shrink-0 mt-0.5 text-xs font-bold">3</div>
                                                <p>Menghitung besar induksi magnetik pada suatu titik di sekitar kawat lurus panjang.</p>
                                            </li>
                                        </ul>
                                    </div>
                                )}

                                {/* KONTEN: TEORI */}
                                {activeTab === 'teori' && (
                                    <div className="animate-fade-in text-slate-800 text-sm">
                                        <h2 className="text-base font-bold text-blue-800 mb-3 border-b pb-1">Teori Singkat</h2>
                                        <div className="space-y-3">
                                            <p><strong>Hukum Oersted:</strong> Arus listrik yang mengalir pada kawat penghantar akan menimbulkan medan magnet di sekitarnya.</p>
                                            <div className="bg-blue-50 p-3 rounded-lg border border-blue-100">
                                                <p className="font-semibold text-blue-800 mb-1">Kaidah Tangan Kanan</p>
                                                <ul className="list-disc pl-5 space-y-1 text-slate-700">
                                                    <li><strong>Ibu Jari:</strong> Arah Arus Listrik (I)</li>
                                                    <li><strong>Empat Jari:</strong> Arah Medan Magnet (B)</li>
                                                </ul>
                                            </div>
                                            <div className="bg-slate-100 p-3 rounded-lg text-center border border-slate-200">
                                                <p className="text-xs text-slate-500 mb-1">Induksi Magnetik Kawat Lurus Panjang</p>
                                                <p className="text-lg font-bold text-slate-800">B = (μ₀ · I) / (2π · a)</p>
                                                <p className="text-xs text-slate-600 mt-2 text-left">
                                                    Keterangan:<br/>
                                                    B = Induksi magnet (Tesla)<br/>
                                                    I = Kuat arus listrik (Ampere)<br/>
                                                    a = Jarak titik ke kawat (Meter)<br/>
                                                    μ₀ = 4π × 10⁻⁷ Wb/Am
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* KONTEN: PROSEDUR */}
                                {activeTab === 'prosedur' && (
                                    <div className="animate-fade-in text-slate-800 text-sm">
                                        <h2 className="text-base font-bold text-blue-800 mb-3 border-b pb-1">Prosedur Penggunaan</h2>
                                        <ol className="space-y-3 list-decimal pl-4">
                                            <li className="pl-1">Pastikan simulasi 3D di kolom sebelah kanan sudah termuat.</li>
                                            <li className="pl-1">Gunakan mouse/sentuhan untuk merotasi pandangan pada kawat lurus 3D.</li>
                                            <li className="pl-1">Amati panah merah (Arus Listrik) dan lingkaran (Medan Magnet).</li>
                                            <li className="pl-1">Terapkan <strong>Kaidah Tangan Kanan</strong>: arahkan ibu jari sesuai panah merah.</li>
                                            <li className="pl-1">Buka tab <strong>Evaluasi</strong> untuk menguji pemahaman.</li>
                                        </ol>
                                    </div>
                                )}

                                {/* KONTEN: SIMULASI */}
                                {activeTab === 'simulasi' && (
                                    <div className="animate-fade-in text-slate-800 text-sm h-full flex flex-col justify-center items-center text-center">
                                        <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mb-4">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
                                        </div>
                                        <h2 className="text-lg font-bold text-blue-800 mb-2">Simulasi Aktif</h2>
                                        <p className="text-slate-600 px-4">
                                            Model AR/3D ditampilkan di kolom kanan. Silakan berinteraksi langsung dengan panel tersebut.
                                        </p>
                                    </div>
                                )}

                                {/* KONTEN: EVALUASI */}
                                {activeTab === 'evaluasi' && (
                                    <div className="animate-fade-in text-slate-800 text-sm flex flex-col h-full">
                                        <h2 className="text-base font-bold text-blue-800 mb-3 border-b pb-1 shrink-0">Evaluasi Pemahaman</h2>
                                        
                                        {isFinished ? (
                                            <div className="flex-1 flex flex-col items-center justify-center text-center py-4">
                                                <div className="mb-4">
                                                    <IconTrophy />
                                                </div>
                                                <h3 className="text-lg font-bold text-slate-800 mb-2">Evaluasi Selesai!</h3>
                                                <p className="text-slate-600 mb-2">Skor Anda:</p>
                                                <div className="text-5xl font-black text-blue-600 mb-6">{score * 20}</div>
                                                <button 
                                                    onClick={handleResetQuiz}
                                                    className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-md font-semibold transition"
                                                >
                                                    Ulangi Evaluasi
                                                </button>
                                            </div>
                                        ) : (
                                            <>
                                                <div className="flex justify-between items-center mb-3 shrink-0">
                                                    <span className="text-xs font-bold bg-blue-100 text-blue-800 px-2 py-1 rounded">
                                                        Soal {currentQIndex + 1} dari {questions.length}
                                                    </span>
                                                </div>

                                                <div className="bg-slate-100 p-3 rounded-lg mb-4 text-justify shadow-inner">
                                                    {question.text}
                                                </div>

                                                <div className="space-y-2 flex-1">
                                                    {question.options.map((opt) => (
                                                        <label 
                                                            key={opt.id} 
                                                            className={`flex items-center p-2 border rounded-md cursor-pointer transition-all ${
                                                                isSubmitted 
                                                                    ? opt.id === question.correct 
                                                                        ? 'bg-green-100 border-green-500' 
                                                                        : selectedAnswer === opt.id 
                                                                            ? 'bg-red-100 border-red-500' 
                                                                            : 'bg-slate-50 border-slate-200 opacity-50'
                                                                    : selectedAnswer === opt.id 
                                                                        ? 'bg-blue-50 border-blue-500 ring-1 ring-blue-500' 
                                                                        : 'bg-white border-slate-300 hover:bg-slate-50'
                                                            }`}
                                                        >
                                                            <input
                                                                type="radio"
                                                                name="quiz"
                                                                value={opt.id}
                                                                checked={selectedAnswer === opt.id}
                                                                onChange={() => !isSubmitted && setSelectedAnswer(opt.id)}
                                                                disabled={isSubmitted}
                                                                className="mr-3 w-4 h-4 text-blue-600"
                                                            />
                                                            <span className="font-semibold mr-2">{opt.id}.</span> {opt.text}
                                                            
                                                            {isSubmitted && opt.id === question.correct && <IconCheckCircle />}
                                                            {isSubmitted && selectedAnswer === opt.id && opt.id !== question.correct && <IconXCircle />}
                                                        </label>
                                                    ))}
                                                </div>

                                                {/* Feedback Section */}
                                                {isSubmitted && (
                                                    <div className={`mt-4 p-3 rounded-md text-sm border ${selectedAnswer === question.correct ? 'bg-green-50 border-green-200 text-green-800' : 'bg-red-50 border-red-200 text-red-800'}`}>
                                                        <p className="font-bold mb-1">
                                                            {selectedAnswer === question.correct ? 'Jawaban Anda Benar!' : 'Jawaban Anda Kurang Tepat.'}
                                                        </p>
                                                        <p className="text-xs bg-white/50 p-2 mt-2 rounded">
                                                            <strong>Pembahasan:</strong><br/>
                                                            {question.explanation}
                                                        </p>
                                                    </div>
                                                )}

                                                {/* Tombol Aksi */}
                                                <div className="mt-4 pt-3 border-t shrink-0 flex gap-2">
                                                    {!isSubmitted ? (
                                                        <button 
                                                            onClick={handleSubmit}
                                                            disabled={!selectedAnswer}
                                                            className="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-md font-semibold transition disabled:opacity-50 disabled:cursor-not-allowed"
                                                        >
                                                            Cek Jawaban
                                                        </button>
                                                    ) : (
                                                        <button 
                                                            onClick={handleNext}
                                                            className="flex-1 bg-slate-800 hover:bg-slate-900 text-white py-2 rounded-md font-semibold transition flex items-center justify-center gap-2"
                                                        >
                                                            {currentQIndex < questions.length - 1 ? 'Soal Selanjutnya →' : 'Selesai & Lihat Nilai'}
                                                        </button>
                                                    )}
                                                </div>
                                            </>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* KOLOM KANAN: iframe Assemblr */}
                        <div className="flex-1 bg-black relative min-w-0 h-full">
                            {/* Indikator Loading */}
                            <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-500 z-0">
                                <div className="w-8 h-8 border-4 border-slate-600 border-t-blue-500 rounded-full animate-spin mb-3"></div>
                                <p className="text-sm">Memuat Model 3D...</p>
                            </div>
                            
                            <iframe 
                                src='https://viewer.assemblrworld.com/Embed/-r85HrUTSd6kZswZsGdW' 
                                allow="camera; microphone; gyroscope; accelerometer; magnetometer; xr-spatial-tracking; fullscreen" 
                                allowFullScreen
                                width="100%"
                                height="100%"
                                className="absolute top-0 left-0 border-none z-10 bg-transparent"
                                style={{ width: '100%', height: '100%' }}
                                title="Simulasi Kemagnetan 3D"
                            />
                        </div>

                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
